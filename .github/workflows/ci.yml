name: UploadX CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # Job 1: Test & Lint Python FastAPI Backend Engine
  backend-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        if [ -f engine/requirements.txt ]; then pip install -r engine/requirements.txt; fi

    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 engine --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings.
        flake8 engine --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  # Job 2: Test & Lint Node.js SDK Package
  sdk-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: uploadx/package.json

    - name: Install Node SDK Dependencies
      run: |
        cd uploadx
        npm install

    - name: Verify package structure
      run: |
        cd uploadx
        node -e "require('./index.js')"
